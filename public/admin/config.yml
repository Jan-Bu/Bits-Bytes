backend:
  name: github
  repo: tvoje-org/tvuj-repo # ← uprav
  branch: main             # ← uprav
  base_url: /.netlify/functions/oauth
  auth_endpoint: start     # => /.netlify/functions/oauth/start

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog_cs"
    label: "Blog (česky)"
    format: "json"
    delete: false
    editor:
      preview: false
    files:
      - name: "cs_blog"
        label: "cs.blog.json"
        file: "src/data/i18n/cs.blog.json"
        fields:
          - label: "Příspěvky"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.date}})"
            fields:
              - { label: "ID", name: "id", widget: "string", required: false }
              - { label: "Název (soubor)", name: "title", widget: "string" }
              - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - { label: "Kategorie", name: "category", widget: "string" }
              - { label: "Text", name: "body", widget: "text" }

  - name: "blog_en"
    label: "Blog (English)"
    format: "json"
    delete: false
    editor:
      preview: false
    files:
      - name: "en_blog"
        label: "en.blog.json"
        file: "src/data/i18n/en.blog.json"
        fields:
          - label: "Posts"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.date}})"
            fields:
              - { label: "ID", name: "id", widget: "string", required: false }
              - { label: "Title (filename)", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
