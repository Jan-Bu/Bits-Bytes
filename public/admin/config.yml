backend:
  name: github
  repo: Jan-Bu/Bits-Bytes
  branch: Hlavni
  base_url: "https://bits-bytes.netlify.app/.netlify/functions/oauth"
  auth_endpoint: "authorize"

media_folder: "public/uploads"
public_folder: "/uploads"
publish_mode: editorial_workflow

collections:
  - name: "blog_cs"
    label: "Blog (CS)"
    format: "json"
    files:
      - name: "cs_blog"
        file: "src/data/i18n/cs.blog.json"
        fields:
          - label: "Položky"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID (slug)", name: "id", widget: "string" }
              - { label: "Název", name: "title", widget: "string" }
              - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - { label: "Kategorie", name: "category", widget: "select", options: ["NOVINKY","WEBDESIGN","GRAFIKA","BRANDING","TISK"] }
              - { label: "Text", name: "body", widget: "text" }

  - name: "blog_en"
    label: "Blog (EN)"
    format: "json"
    files:
      - name: "en_blog"
        file: "src/data/i18n/en.blog.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID (slug)", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - { label: "Category", name: "category", widget: "select", options: ["NEWS","WEBDESIGN","GRAPHICS","BRANDING","PRINT"] }
              - { label: "Body", name: "body", widget: "text" }
