<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Admin</title>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      // Příjem GitHub tokenu z OAuth callback okna
      window.addEventListener("message", (e) => {
        if (e.origin !== window.location.origin) return;
        if (e.data && e.data.type === "github_token") {
          // Decap si token načte přes backend; tohle je jen pro debug.
          console.log("GitHub token OK");
        }
      });
    </script>
  </body>
</html>
