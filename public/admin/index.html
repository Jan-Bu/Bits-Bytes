<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Admin</title>
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" defer></script>

    <!-- Bridge: pokud popup nestihl poslat postMessage, přečteme token z localStorage a doručíme ho Decapu -->
    <script>
      (function () {
        function deliver() {
          try {
            var t = localStorage.getItem("decap:bridge:github_token");
            if (t) {
              window.postMessage({ token: t }, "*");
              window.postMessage("authorization:github:token:" + t, "*");
              // po doručení uklidit
              localStorage.removeItem("decap:bridge:github_token");
            }
          } catch (e) {}
        }
        // zkus ihned po načtení a pak ještě jednou po malé prodlevě
        deliver();
        setTimeout(deliver, 400);
      })();
    </script>
  </body>
</html>
