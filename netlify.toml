# Mapuj URL /proxy na edge funkci "proxy"
[[edge_functions]]
path = "/proxy"
function = "proxy"

# Pokud používáš SPA fallback, musí být AŽ za /proxy
[[redirects]]
from = "/proxy"
to = "/.netlify/edge-functions/proxy"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200