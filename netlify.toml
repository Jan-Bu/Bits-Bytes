[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA routing (pokud používáš react-router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# (volitelné) přesměrování na admin bez lomítka
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
