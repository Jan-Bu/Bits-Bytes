[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA routing (react-router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# (volitelné) přesměrování na admin bez lomítka
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
